# netlify.toml - Netlify Configuration

[build]
  publish = "."
  command = "echo 'No build step needed'"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"

[identity]
  enable = true

[[redirects]]
  from = "/.netlify/identity/"
  to = "/index.html"
  status = 200

[[forms]]
  name = "service-order"
  honeypot = "bot-field"